<div class="header">
  <select class="langMenu" name="langs" [(ngModel)]="activeLang" (change)="onLanguageChange()">
    <option class="langMenuEntry" *ngFor="let entry of availableLangs" [value]="entry">
      {{ entry }}
    </option>
  </select>

  <h1 class="headerText">{{ headerTitle }}</h1>
  <button *ngIf="authService.getToken()" (click)="onToggleMenu()" class="menuBtn">
    <fa-icon [icon]="faBars"></fa-icon>
  </button>

  <div class="menu" [ngClass]="{ menuActive: menuActive }">
    <div class="menuLinks">
      <ng-container *ngFor="let entry of menuEntries">
        <div
          *ngIf="!entry.onlyAdmin || userRole == 'admin' || userRole == 'master'"
          class="menuInner"
        >
          <app-menu-entry
            (click)="onToggleMenu()"
            [title]="entry.title"
            [link]="entry.link"
            [icon_name]="entry.icon_name"
            [action]="entry.action"
          ></app-menu-entry>
          <hr class="divider" />
        </div>
      </ng-container>
    </div>

    <div class="menuAttribution">
      <a class="menuAttributionLink" routerLink="/info" (click)="onToggleMenu()">
        {{ 'info.title' | transloco }}
      </a>
    </div>
  </div>
  <div
    class="backdrop"
    *ngIf="menuActive"
    [ngClass]="{ backdropActive: menuActive }"
    (click)="onToggleMenu()"
  ></div>
</div>
